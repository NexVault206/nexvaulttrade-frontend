<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — NexVaultTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #07090f, #0a0c12); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .signup-card { background: #0f121b; padding: 40px 42px; border-radius: 48px; width: 480px; max-width: 100%; border: 1px solid #2a3145; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #f5a623; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .signup-card h1 { color: #f5a623; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 20px; font-size: 0.95rem; }
        .bonus-note { background: #1e2a3a; padding: 12px 16px; border-radius: 30px; text-align: center; margin: 0 0 18px 0; color: #f5a623; font-weight: 600; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1f2c; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #f5a623; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
        button { width: 100%; background: #f5a623; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; transition: opacity 0.2s; color: #0f121b; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg-box { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; line-height: 1.4; }
        .msg-box.error { background: #2a1515; color: #f87171; display: block; }
        .msg-box.success { background: #152a1a; color: #4ade80; display: block; }
        .msg-box.info { background: #1a263a; color: #93c5fd; display: block; }
        .back-link { text-align: center; margin-top: 22px; color: #9ca3af; font-size: 0.95rem; }
        .back-link a { color: #f5a623; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
        @media (max-width: 520px) { .signup-card { padding: 28px 20px; } }
    </style>
</head>
<body>
<div class="signup-card">
    <div class="logo"><span>⬡ NexVaultTrade</span></div>
    <h1>Create Account</h1>
    <p class="sub">Join now and get 10% bonus on first deposit*</p>
    <div class="bonus-note">🎁 Limited time offer: 10% extra bonus</div>

    <input type="text" id="signupName" placeholder="Full Name" autocomplete="name">
    <input type="email" id="signupEmail" placeholder="Email Address" autocomplete="email">
    <input type="password" id="signupPassword" placeholder="Create Password (min 6 chars)" autocomplete="new-password">
    <input type="password" id="signupConfirm" placeholder="Confirm Password" autocomplete="new-password">

    <div class="msg-box" id="msgBox"></div>
    <button type="button" id="signupBtn">Sign Up &amp; Claim Bonus</button>

    <div class="back-link">
        Already have an account? <a href="nexvaulttrade_login.html">Login</a> &nbsp;|&nbsp;
        <a href="nexvaulttrade_index.html">Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const SUPABASE_URL = 'https://vfpxnywxciwxldbhlqhp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcHhueXd4Y2l3eGxkYmhscWhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzU5MzEsImV4cCI6MjA5ODIxMTkzMX0.mUDHLVKsCL6Jd-ZMvnYWBoyoNf3cKXpbVUuj4qHpHqg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client created (signup)');

        const nameInput = document.getElementById('signupName');
        const emailInput = document.getElementById('signupEmail');
        const passInput = document.getElementById('signupPassword');
        const confirmInput = document.getElementById('signupConfirm');
        const btn = document.getElementById('signupBtn');
        const msgBox = document.getElementById('msgBox');

        // redirect if already logged in
        (async function checkSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) window.location.href = 'nexvaulttrade_dashboard.html';
            } catch (e) {
                console.warn('Session check error:', e);
            }
        })();

        function showMessage(text, type = 'error') {
            msgBox.className = 'msg-box ' + type;
            msgBox.textContent = text;
            msgBox.style.display = 'block';
        }
        function hideMessage() {
            msgBox.style.display = 'none';
            msgBox.className = 'msg-box';
        }

        async function handleSignup() {
            console.log('Signup button clicked');
            hideMessage();
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passInput.value;
            const confirm = confirmInput.value;

            if (!name || !email || !password || !confirm) return showMessage('Please fill in all fields.', 'error');
            if (password !== confirm) return showMessage('Passwords do not match.', 'error');
            if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error');

            btn.disabled = true;
            btn.textContent = 'Creating account…';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: name },
                        emailRedirectTo: 'https://nexvaulttrade.onrender.com/nexvaulttrade_login.html'
                    }
                });

                if (error) {
                    if (error.message.includes('already registered')) {
                        return showMessage('This email is already registered. Please login instead.', 'error');
                    }
                    return showMessage(error.message, 'error');
                }

                showMessage(
                    '✅ Account created! Sending you to verification...',
                    'success'
                );
                btn.disabled = true;
                btn.textContent = 'Redirecting…';
                localStorage.setItem('pending_verify_email', email);
                nameInput.value = emailInput.value = passInput.value = confirmInput.value = '';

                setTimeout(() => {
                    window.location.href = 'nexvaulttrade_verify.html?email=' + encodeURIComponent(email);
                }, 1200);

            } catch (err) {
                console.error(err);
                showMessage('Unexpected error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Sign Up & Claim Bonus';
            }
        }

        btn.addEventListener('click', handleSignup);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });

        // check URL param for pending verification reminder
        (function checkUrlParam() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('verified') === 'pending') {
                showMessage('📩 We sent a verification email. Please click the link in that email to activate your account, then log in.', 'info');
            }
        })();
    });
</script>
</body>
</html>
