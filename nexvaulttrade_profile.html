<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Account Settings | NexvaultTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px 16px 110px 16px;
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        :root {
            --bg-primary: #0A0E17;
            --bg-secondary: #0F1624;
            --bg-card: #0F1624;
            --bg-elevated: #131A2C;
            --border: #1E293B;
            --text-primary: #EFF3FC;
            --text-secondary: #94A3B8;
            --accent: #D4AF37;
            --accent-dark: #B8860B;
            --accent-hover: #C5A028;
            --success: #2BE07E;
            --warning: #FFB347;
            --danger: #FF4D4D;
        }
        body.light {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-elevated: #E2E8F0;
            --border: #CBD5E1;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --accent: #B8860B;
            --accent-dark: #8B6508;
            --accent-hover: #9A7209;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-secondary);
            border-radius: 40px;
            padding: 24px 20px 32px;
            border: 1px solid var(--border);
        }
        .logo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            background: linear-gradient(135deg, var(--accent), #F3E5AB);
            width: 40px; height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: #0A0E17;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(120deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
        }
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 8px 0 28px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            border: 2px solid var(--border);
            margin-bottom: 12px;
        }
        .profile-name-large {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .profile-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .settings-form {
            margin-top: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group .field-value {
            background: var(--bg-elevated);
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: border 0.2s;
        }
        .form-group .field-value:focus {
            border-color: var(--accent);
        }
        .form-group .field-value[readonly] {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: #0A0E17;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 12px;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .toast-msg {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 200;
            border: 1px solid var(--border);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }
        .back-link i { margin-right: 6px; }
        .back-link:hover { color: var(--text-primary); }
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;
            max-width:600px;background:var(--bg-primary);border-top:1px solid var(--border);
            display:flex;justify-content:space-around;padding:10px 8px;
            border-radius:24px 24px 0 0;z-index:100;}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
            font-size:10px;color:var(--text-secondary);cursor:pointer;text-decoration:none;
            padding:4px 8px;border-radius:12px;transition:0.2s;min-width:44px;}
        .nav-item i{font-size:20px;}
        .nav-item.active,.nav-item:hover{color:var(--accent);}
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="logo-header">
        <div class="logo">
            <div class="logo-icon">N</div>
            <div class="logo-text">NexvaultTrade</div>
        </div>
        <div class="header-actions">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
        </div>
    </div>

    <!-- Profile Content -->
    <div id="profileScreen">
        <span class="back-link" id="backToDashboard"><i class="fas fa-arrow-left"></i> Dashboard</span>

        <div class="profile-header">
            <div class="profile-avatar">TO</div>
            <div class="profile-name-large">TOWOBOLAOYELADE</div>
            <div class="profile-sub">Manage your personal information and preferences</div>
        </div>

        <form class="settings-form" id="profileForm">
            <!-- Full Name -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="field-value" id="fullName" value="JHON DOE">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="field-value" id="email" value="">
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="field-value" id="phone" value="">
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" class="field-value" id="dob" value="">
            </div>

            <!-- Country & Address (two columns) -->
            <div class="form-row">
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" class="field-value" id="country" value="">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="field-value" id="address" value="">
                </div>
            </div>

            <!-- Update Button -->
            <button type="submit" class="btn-primary" id="updateProfileBtn">Update Profile</button>
        </form>
    </div>
</div>

<nav class="bottom-nav">
    <a href="nexvaulttrade_dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="nexvaulttrade_deposit.html" class="nav-item"><i class="fas fa-arrow-down"></i><span>Deposit</span></a>
    <a href="nexvaulttrade_withdraw.html" class="nav-item"><i class="fas fa-arrow-up"></i><span>Withdraw</span></a>
    <a href="nexvaulttrade_plans.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Plans</span></a>
    <a href="nexvaulttrade_actions.html" class="nav-item"><i class="fas fa-cogs"></i><span>Actions</span></a>
    <a href="nexvaulttrade_history.html" class="nav-item"><i class="fas fa-clock"></i><span>History</span></a>
    <a href="nexvaulttrade_profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
</nav>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', function() {
            document.body.classList.toggle('light');
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // Back to dashboard
        document.getElementById('backToDashboard').addEventListener('click', function() {
            window.location.href = 'nexvaulttrade_dashboard.html';
        });

        // Update profile
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const dob = document.getElementById('dob').value;
            const country = document.getElementById('country').value.trim();
            const address = document.getElementById('address').value.trim();

            // Simple validation
            if (!fullName || !email || !phone) {
                showToast('Please fill in all required fields.');
                return;
            }
           // Simulate update
            showToast('✅ Profile updated successfully!');
            // Optionally update the avatar initials
            const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase();
            document.querySelector('.profile-avatar').textContent = initials || 'U';
            document.querySelector('.profile-name-large').textContent = fullName;
        });

        // Toast helper
        function showToast(msg) {
            let toast = document.querySelector('.toast-msg');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        // If there's a stored user profile in localStorage, we could pre-fill,
        // but we keep the static values as in the image.
    });
</script>
</body>
