<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NexVaultTrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #07090f 0%, #0a0c12 100%); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-card { background: #0f121b; padding: 48px; border-radius: 48px; width: 420px; max-width: 90%; border: 1px solid #2a3145; box-shadow: 0 25px 45px rgba(0,0,0,0.5); }
    .login-card h1 { color: #f5a623; margin-bottom: 8px; }
    .login-card p { color: #9ca3af; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 14px 18px; margin: 8px 0; background: #1a1f2c; border: 1px solid #2d354c; border-radius: 30px; color: white; font-size: 1rem; outline: none; transition: border 0.2s; }
    .login-card input:focus { border-color: #f5a623; }
    .login-card button { width: 100%; background: #f5a623; padding: 14px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 16px; transition: opacity 0.2s; }
    .login-card button:hover { opacity: 0.9; }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .links { text-align: center; margin-top: 24px; }
    .links a { color: #f5a623; text-decoration: none; margin: 0 8px; }
    .back-home { display: block; text-align: center; margin-top: 20px; }
    .error-msg { background: #2a1515; color: #f87171; padding: 12px 16px; border-radius: 12px; margin-top: 12px; font-size: 0.9rem; display: none; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo span { color: #f5a623; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo"><span>⬡ NexVaultTrade</span></div>
  <h1>Welcome Back</h1>
  <p>Login to your NexVaultTrade account</p>
  <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email">
  <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
  <div class="error-msg" id="errorMsg"></div>
  <button id="loginBtn" onclick="handleLogin()">Login</button>
  <div class="links">
    <a href="nexvaulttrade_createaccount.html">Create Account</a> | <a href="#">Forgot Password?</a>
  </div>
  <div class="back-home"><a href="nexvaulttrade_index.html" style="color:#f5a623;">← Back to Home</a></div>
</div>

<script>
  // ── CONFIG — replace with your Render backend URL after deploying ──
  const API_BASE = 'https://nexvaulttrade-backend.onrender.com/api';

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('nvt_token')) {
    window.location.href = 'nexvaulttrade_dashboard.html';
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    errEl.style.display = 'none';
    if (!email || !password) return showError('Please fill in all fields.');

    btn.disabled    = true;
    btn.textContent = 'Logging in...';

    try {
      const res  = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) return showError(data.msg || 'Login failed.');

      // Save token and user data
      localStorage.setItem('nvt_token', data.token);
      localStorage.setItem('nvt_user',  JSON.stringify(data.user));

      // Redirect to dashboard
      setTimeout(() => { window.location.href = 'nexvaulttrade_dashboard.html'; }, 300);
    } catch (err) {
      showError('Cannot connect to server. Please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Login';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent    = msg;
    el.style.display  = 'block';
    document.getElementById('loginBtn').disabled    = false;
    document.getElementById('loginBtn').textContent = 'Login';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
