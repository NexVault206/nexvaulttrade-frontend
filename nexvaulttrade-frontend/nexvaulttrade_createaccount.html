<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — NexVaultTrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #07090f, #0a0c12); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .signup-card { background: #0f121b; padding: 48px; border-radius: 48px; width: 480px; max-width: 90%; border: 1px solid #2a3145; box-shadow: 0 25px 45px rgba(0,0,0,0.5); }
    .signup-card h1 { color: #f5a623; margin-bottom: 4px; }
    .signup-card p { color: #9ca3af; margin-bottom: 16px; }
    .signup-card input { width: 100%; padding: 14px 18px; margin: 8px 0; background: #1a1f2c; border: 1px solid #2d354c; border-radius: 30px; color: white; font-size: 1rem; outline: none; transition: border 0.2s; }
    .signup-card input:focus { border-color: #f5a623; }
    .signup-card button { width: 100%; background: #f5a623; padding: 14px; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; border: none; transition: opacity 0.2s; }
    .signup-card button:hover { opacity: 0.9; }
    .signup-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .bonus-note { background: #1e2a3a; padding: 12px; border-radius: 30px; text-align: center; margin: 16px 0; color: #f5a623; font-weight: 600; }
    .back-link { text-align: center; margin-top: 20px; color: #9ca3af; }
    .error-msg { background: #2a1515; color: #f87171; padding: 12px 16px; border-radius: 12px; margin-top: 12px; font-size: 0.9rem; display: none; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo span { color: #f5a623; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
  </style>
</head>
<body>
<div class="signup-card">
  <div class="logo"><span>⬡ NexVaultTrade</span></div>
  <h1>Create Account</h1>
  <p>Join now and get 10% bonus on first deposit*</p>
  <div class="bonus-note">🎁 Limited time offer: 10% extra bonus</div>
  <input type="text"     id="signupName"      placeholder="Full Name">
  <input type="email"    id="signupEmail"     placeholder="Email Address" autocomplete="email">
  <input type="password" id="signupPassword"  placeholder="Create Password (min 6 chars)">
  <input type="password" id="signupConfirm"   placeholder="Confirm Password">
  <div class="error-msg" id="errorMsg"></div>
  <button id="signupBtn" onclick="handleSignup()">Sign Up & Claim Bonus</button>
  <div class="back-link">
    Already have an account? <a href="nexvaulttrade_login.html" style="color:#f5a623;">Login</a> |
    <a href="nexvaulttrade_index.html" style="color:#f5a623;">Home</a>
  </div>
</div>

<script>
  // ── CONFIG — replace with your Render backend URL after deploying ──
  const API_BASE = 'https://nexvaulttrade-backend.onrender.com/api';

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('nvt_token')) {
    window.location.href = 'nexvaulttrade_dashboard.html';
  }

  async function handleSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const btn      = document.getElementById('signupBtn');

    document.getElementById('errorMsg').style.display = 'none';

    if (!name || !email || !password || !confirm) return showError('Please fill in all fields.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (password.length < 6) return showError('Password must be at least 6 characters.');

    btn.disabled    = true;
    btn.textContent = 'Creating account...';

    try {
      const res  = await fetch(`${API_BASE}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (!res.ok) return showError(data.msg || 'Signup failed.');

      // Save token and user data
      localStorage.setItem('nvt_token', data.token);
      localStorage.setItem('nvt_user',  JSON.stringify(data.user));

      // Redirect to dashboard
      setTimeout(() => { window.location.href = 'nexvaulttrade_dashboard.html'; }, 300);
    } catch (err) {
      showError('Cannot connect to server. Please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign Up & Claim Bonus';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent   = msg;
    el.style.display = 'block';
    document.getElementById('signupBtn').disabled    = false;
    document.getElementById('signupBtn').textContent = 'Sign Up & Claim Bonus';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
