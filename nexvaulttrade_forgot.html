<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — NexVaultTrade</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #111; border: 1px solid #c9a84c44; border-radius: 16px; padding: 35px 25px; max-width: 420px; width: 100%; }
  .logo { font-size: 22px; font-weight: bold; letter-spacing: 2px; background: linear-gradient(135deg,#c9a84c,#f5d77e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; text-align: center; }
  h1 { font-size: 20px; margin-bottom: 8px; color: #f5d77e; text-align: center; }
  p.sub { color: #999; font-size: 14px; margin-bottom: 22px; text-align: center; }
  input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #c9a84c44; border-radius: 8px; color: #fff; font-size: 15px; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #c9a84c; }
  button { width: 100%; padding: 14px; background: linear-gradient(135deg,#c9a84c,#f5d77e); border: none; border-radius: 8px; color: #0a0a0a; font-weight: bold; font-size: 15px; cursor: pointer; }
  button:disabled { opacity: 0.6; }
  .back { text-align: center; margin-top: 18px; font-size: 13px; }
  .back a { color: #c9a84c; text-decoration: none; }
  .msg { margin-top: 16px; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }
  .msg.error { background: #3a1414; color: #ff8a8a; display: block; }
  .msg.success { background: #14301a; color: #8aff9e; display: block; }
  .msg.info { background: #1a2433; color: #8ac6ff; display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">NEXVAULTTRADE</div>
  <h1>Forgot Password?</h1>
  <p class="sub">Enter your email and we will send you a reset code.</p>
  <input type="email" id="emailInput" placeholder="Email address" autocomplete="email">
  <button id="sendBtn">Send Reset Code</button>
  <div class="back"><a href="nexvaulttrade_login.html">Back to Login</a></div>
  <div class="msg" id="msgBox"></div>
</div>
<script>
  const SUPABASE_URL = 'https://vfpxnywxciwxldbhlqhp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcHhueXd4Y2l3eGxkYmhscWhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzU5MzEsImV4cCI6MjA5ODIxMTkzMX0.mUDHLVKsCL6Jd-ZMvnYWBoyoNf3cKXpbVUuj4qHpHqg';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.addEventListener('DOMContentLoaded', function() {
    const emailInput = document.getElementById('emailInput');
    const sendBtn = document.getElementById('sendBtn');
    const msgBox = document.getElementById('msgBox');
    function showMessage(text, type) { msgBox.textContent = text; msgBox.className = 'msg ' + type; }
    async function handleSend() {
      const email = emailInput.value.trim();
      if (!email) return showMessage('Please enter your email.', 'error');
      sendBtn.disabled = true; sendBtn.textContent = 'Sending...';
      const { error } = await supabase.auth.resetPasswordForEmail(email);
      sendBtn.disabled = false; sendBtn.textContent = 'Send Reset Code';
      if (error) { showMessage(error.message, 'error'); return; }
      localStorage.setItem('pending_reset_email', email);
      showMessage('Reset code sent! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'nexvaulttrade_reset_verify.html?email=' + encodeURIComponent(email); }, 1200);
    }
    sendBtn.addEventListener('click', handleSend);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
  });
</script>
</body>
</html>
