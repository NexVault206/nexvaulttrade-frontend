<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — NexVaultTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #07090f, #0a0c12); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .reset-card { background: #0f121b; padding: 40px 42px; border-radius: 48px; width: 420px; max-width: 100%; border: 1px solid #2a3145; box-shadow: 0 25px 45px rgba(0,0,0,0.6); }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo span { color: #f5a623; font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; }
        .reset-card h1 { color: #f5a623; font-weight: 700; font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #9ca3af; margin-bottom: 24px; font-size: 0.95rem; }
        input { width: 100%; padding: 14px 18px; margin: 6px 0; background: #1a1f2c; border: 1px solid #2d354c; border-radius: 30px; color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: #f5a623; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
        button { width: 100%; background: #f5a623; padding: 15px; border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; margin-top: 16px; cursor: pointer; transition: opacity 0.2s; color: #0f121b; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg-box { padding: 12px 16px; border-radius: 12px; margin-top: 14px; font-size: 0.9rem; display: none; line-height: 1.4; }
        .msg-box.error { background: #2a1515; color: #f87171; display: block; }
        .msg-box.success { background: #152a1a; color: #4ade80; display: block; }
        .msg-box.info { background: #1a263a; color: #93c5fd; display: block; }
        .back-link { text-align: center; margin-top: 22px; color: #9ca3af; font-size: 0.95rem; }
        .back-link a { color: #f5a623; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
        @media (max-width: 520px) { .reset-card { padding: 28px 20px; } }
    </style>
</head>
<body>
<div class="reset-card">
    <div class="logo"><span>⬡ NexVaultTrade</span></div>
    <h1>Reset Password</h1>
    <p class="sub">Enter your new password below.</p>

    <input type="password" id="newPassword" placeholder="New password (min 6 chars)" autocomplete="new-password">
    <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">

    <div class="msg-box" id="msgBox"></div>
    <button id="resetBtn" disabled>Update Password</button>

    <div class="back-link">
        <a href="nexvaulttrade_login.html">← Back to Login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://vfpxnywxciwxldbhlqhp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcHhueXd4Y2l3eGxkYmhscWhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzU5MzEsImV4cCI6MjA5ODIxMTkzMX0.mUDHLVKsCL6Jd-ZMvnYWBoyoNf3cKXpbVUuj4qHpHqg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const newPass = document.getElementById('newPassword');
    const confirmPass = document.getElementById('confirmPassword');
    const btn = document.getElementById('resetBtn');
    const msgBox = document.getElementById('msgBox');

    let sessionReady = false;

    function showMessage(text, type = 'error') {
        msgBox.className = 'msg-box ' + type;
        msgBox.textContent = text;
        msgBox.style.display = 'block';
    }
    function hideMessage() {
        msgBox.style.display = 'none';
        msgBox.className = 'msg-box';
    }

    // ── Listen for auth state changes to know when session is available ──
    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
            sessionReady = true;
            btn.disabled = false;
            showMessage('You are authenticated. Please set your new password.', 'info');
        } else if (event === 'SIGNED_OUT' || !session) {
            // If no session after a few seconds, show error
            setTimeout(() => {
                if (!sessionReady) {
                    showMessage('Invalid or expired reset link. Please request a new password reset.', 'error');
                    btn.disabled = true;
                }
            }, 2000);
        }
    });

    // Also check immediately in case session already exists
    (async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            sessionReady = true;
            btn.disabled = false;
            showMessage('You are authenticated. Please set your new password.', 'info');
        } else {
            // Wait for onAuthStateChange to trigger
            btn.disabled = true;
            showMessage('Verifying your reset link…', 'info');
        }
    })();

    async function handleReset() {
        hideMessage();
        const password = newPass.value;
        const confirm = confirmPass.value;

        if (!password || !confirm) return showMessage('Please fill in both fields.', 'error');
        if (password !== confirm) return showMessage('Passwords do not match.', 'error');
        if (password.length < 6) return showMessage('Password must be at least 6 characters.', 'error');

        btn.disabled = true;
        btn.textContent = 'Updating…';

        try {
            const { data, error } = await supabase.auth.updateUser({ password });

            if (error) {
                return showMessage(error.message, 'error');
            }

            showMessage('✅ Password updated successfully! You can now log in with your new password.', 'success');
            btn.disabled = true;
            btn.textContent = 'Done';

            // Optionally sign out and redirect to login
            await supabase.auth.signOut();

            setTimeout(() => {
                window.location.href = 'nexvaulttrade_login.html';
            }, 3000);

        } catch (err) {
            console.error(err);
            showMessage('Unexpected error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Update Password';
        }
    }

    document.getElementById('resetBtn').addEventListener('click', handleReset);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
